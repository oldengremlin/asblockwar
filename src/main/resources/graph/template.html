<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ASBlockWar · Dependency Graph</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#ECEFF1;overflow:hidden}

#header{position:fixed;top:0;left:0;right:0;height:48px;background:#263238;color:#fff;
        display:flex;align-items:center;gap:10px;padding:0 14px;z-index:20;
        box-shadow:0 2px 6px rgba(0,0,0,.4)}
#title{font-size:13px;font-weight:700;white-space:nowrap;letter-spacing:.4px}
#stats{font-size:10px;opacity:.65;white-space:nowrap;flex:1}
#layout-badge{font-size:10px;color:#80CBC4;white-space:nowrap;opacity:.9;flex-shrink:0}
#search{padding:4px 10px;border-radius:16px;border:none;font-size:12px;width:220px;
        outline:none;background:#37474F;color:#fff}
#search::placeholder{color:#90A4AE}
#search-count{font-size:10px;color:#80CBC4;white-space:nowrap;min-width:50px}
#btn-reset{background:none;border:1px solid #546E7A;color:#90A4AE;border-radius:12px;
           padding:2px 8px;font-size:11px;cursor:pointer;flex-shrink:0}
#btn-reset:hover{background:#37474F;color:#fff}

#graph{position:fixed;top:48px;left:0;width:100%;height:calc(100vh - 48px)}
.node{cursor:pointer}
.node-label{pointer-events:none;text-anchor:middle;dominant-baseline:hanging;fill:#37474F;font-size:9px}

#tooltip{position:fixed;background:rgba(30,40,45,.92);color:#ECEFF1;padding:8px 12px;
         border-radius:6px;font-size:11px;line-height:1.5;pointer-events:none;
         display:none;z-index:100;max-width:320px;box-shadow:0 3px 10px rgba(0,0,0,.5)}

#info-panel{position:fixed;top:56px;right:10px;width:240px;background:#fff;
            border:1px solid #CFD8DC;border-radius:8px;
            box-shadow:0 3px 10px rgba(0,0,0,.15);font-size:11px;display:none;
            overflow:hidden;z-index:15}
#info-header{background:#37474F;color:#fff;padding:7px 10px;display:flex;
             justify-content:space-between;align-items:center;font-size:12px;font-weight:600}
#info-close{background:none;border:none;color:#90A4AE;cursor:pointer;font-size:16px;line-height:1}
#info-body{padding:10px;overflow-y:auto;max-height:400px}
.info-id{font-size:13px;font-weight:700;color:#1A237E;word-break:break-all}
.info-meta{color:#607D8B;margin:2px 0 6px}
.info-label{color:#37474F;margin-bottom:4px}
.info-details{background:#ECEFF1;border-radius:4px;padding:6px 8px;font-size:10px;
              color:#455A64;white-space:pre-wrap;word-break:break-all;margin:4px 0}
.info-neighbors{color:#78909C;margin-top:6px;font-style:italic}
.status-BLOCKED{color:#C62828;font-weight:600}
.status-SUSPICIOUS{color:#E65100;font-weight:600}
.status-CLEAR{color:#2E7D32;font-weight:600}
.status-UNKNOWN{color:#01579B}

#legend{position:fixed;bottom:10px;left:10px;background:rgba(255,255,255,.95);
        border:1px solid #CFD8DC;border-radius:8px;padding:8px 12px;font-size:10px;
        color:#455A64;line-height:1.8;z-index:15;box-shadow:0 2px 6px rgba(0,0,0,.1)}
#legend b{display:block;color:#263238;margin-bottom:2px;font-size:10px}
.leg-row{display:flex;align-items:center;gap:5px}
.leg-shape{display:inline-block;width:14px;text-align:center;font-size:11px}
.leg-color{display:inline-block;width:12px;height:12px;border-radius:2px;border:1.5px solid;flex-shrink:0}

#filters{position:fixed;top:56px;left:10px;background:rgba(255,255,255,.95);
         border:1px solid #CFD8DC;border-radius:8px;padding:7px 10px;font-size:10px;
         color:#455A64;z-index:15;box-shadow:0 2px 6px rgba(0,0,0,.1)}
#filters b{display:block;color:#263238;margin-bottom:3px}
.filter-row{display:flex;align-items:center;gap:4px;margin:1px 0;cursor:pointer}
.filter-row input{cursor:pointer;accent-color:#546E7A}
@keyframes dash-flow { to { stroke-dashoffset: -20; } }
</style>
</head>
<body>
<div id="header">
  <span id="title">ASBlockWar · Dependency Graph</span>
  <span id="stats"></span>
  <span id="layout-badge"></span>
  <input id="search" type="text" placeholder="Пошук: AS12345, MNTNER-NAME…" autocomplete="off">
  <span id="search-count"></span>
  <button id="btn-reset">✕ Reset</button>
</div>

<div id="filters">
  <b>Фільтр статусу</b>
  <label class="filter-row"><input type="checkbox" class="status-filter" data-status="BLOCKED" checked> <span style="color:#C62828">● Blocked</span></label>
  <label class="filter-row"><input type="checkbox" class="status-filter" data-status="SUSPICIOUS" checked> <span style="color:#E65100">● Suspicious</span></label>
  <label class="filter-row"><input type="checkbox" class="status-filter" data-status="CLEAR" checked> <span style="color:#2E7D32">● Clear</span></label>
  <label class="filter-row"><input type="checkbox" class="status-filter" data-status="UNKNOWN" checked> <span style="color:#01579B">● Unknown</span></label>
  <b style="margin-top:5px">Тип вузла</b>
  <label class="filter-row"><input type="checkbox" class="type-filter" data-type="ASN" checked> ASN</label>
  <label class="filter-row"><input type="checkbox" class="type-filter" data-type="AS_SET" checked> AS-SET</label>
  <label class="filter-row"><input type="checkbox" class="type-filter" data-type="MNTNER" checked> MNTNER</label>
  <label class="filter-row"><input type="checkbox" class="type-filter" data-type="ORGANISATION" checked> ORG</label>
</div>

<svg id="graph">
  <defs>
    <marker id="arr-MNT_BY"    markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6" fill="none" stroke="#78909C" stroke-width="1"/></marker>
    <marker id="arr-MNT_REF"   markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6" fill="none" stroke="#BA68C8" stroke-width="1"/></marker>
    <marker id="arr-ORG"       markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6" fill="none" stroke="#4DB6AC" stroke-width="1"/></marker>
    <marker id="arr-MEMBER_OF" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6" fill="none" stroke="#81C784" stroke-width="1"/></marker>
    <marker id="arr-PEER"      markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6" fill="none" stroke="#FFD54F" stroke-width="1"/></marker>
  </defs>
  <g id="zoom-layer">
    <g id="links"></g>
    <!-- Порядок шарів: UNKNOWN → CLEAR → SUSPICIOUS → BLOCKED.
         Blocked і Suspicious завжди поверх — не ховаються за менш важливі вузли. -->
    <g id="nodes-UNKNOWN"></g>
    <g id="nodes-CLEAR"></g>
    <g id="nodes-SUSPICIOUS"></g>
    <g id="nodes-BLOCKED"></g>
  </g>
</svg>

<div id="tooltip"></div>

<div id="info-panel">
  <div id="info-header">
    <span id="info-title">Деталі</span>
    <button id="info-close">×</button>
  </div>
  <div id="info-body"></div>
</div>

<div id="legend">
  <b>Форма → Тип</b>
  <div class="leg-row"><span class="leg-shape">●</span> ASN (aut-num)</div>
  <div class="leg-row"><span class="leg-shape">◆</span> AS-SET</div>
  <div class="leg-row"><span class="leg-shape">■</span> MNTNER</div>
  <div class="leg-row"><span class="leg-shape">⬮</span> ORGANISATION</div>
  <b style="margin-top:6px">Колір → Статус</b>
  <div class="leg-row"><span class="leg-color" style="background:#FFCDD2;border-color:#C62828"></span> Blocked</div>
  <div class="leg-row"><span class="leg-color" style="background:#FFE0B2;border-color:#E65100"></span> Suspicious</div>
  <div class="leg-row"><span class="leg-color" style="background:#DCEDC8;border-color:#558B2F"></span> Clear</div>
  <div class="leg-row"><span class="leg-color" style="background:#E1F5FE;border-color:#01579B"></span> Unknown</div>
  <b style="margin-top:6px">Ребро → Зв'язок</b>
  <div class="leg-row"><svg width="28" height="10"><line x1="0" y1="5" x2="28" y2="5" stroke="#78909C" stroke-width="2"/></svg> mnt-by</div>
  <div class="leg-row"><svg width="28" height="10"><line x1="0" y1="5" x2="28" y2="5" stroke="#BA68C8" stroke-width="1.5" stroke-dasharray="5,2"/></svg> mnt-ref</div>
  <div class="leg-row"><svg width="28" height="10"><line x1="0" y1="5" x2="28" y2="5" stroke="#4DB6AC" stroke-width="2"/></svg> org</div>
  <div class="leg-row"><svg width="28" height="10"><line x1="0" y1="5" x2="28" y2="5" stroke="#81C784" stroke-width="1.5" stroke-dasharray="3,3"/></svg> member-of</div>
  <div class="leg-row"><svg width="28" height="10"><line x1="0" y1="5" x2="28" y2="5" stroke="#FFD54F" stroke-width="1.5" stroke-dasharray="8,3"/></svg> peer</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
<script>
// ── Дані, впроваджені GraphExporter ──────────────────────────────────────
const DATA = [[GRAPH_DATA]];

// ── Палітра ───────────────────────────────────────────────────────────────
const FILL   = {BLOCKED:'#FFCDD2',SUSPICIOUS:'#FFE0B2',CLEAR:'#DCEDC8',UNKNOWN:'#E1F5FE'};
const STROKE = {BLOCKED:'#C62828',SUSPICIOUS:'#E65100',CLEAR:'#558B2F',UNKNOWN:'#01579B'};
const EDGE_COLOR = {MNT_BY:'#78909C',MNT_REF:'#BA68C8',ORG:'#4DB6AC',MEMBER_OF:'#81C784',PEER:'#FFD54F'};
const EDGE_DASH  = {MNT_BY:'',MNT_REF:'5,2',ORG:'',MEMBER_OF:'3,3',PEER:'8,3'};
const EDGE_W     = {MNT_BY:1.5,MNT_REF:1,ORG:1.5,MEMBER_OF:1,PEER:1};
const R = 8; // базовий радіус вузла (SVG-одиниці)

// ── Розміри ───────────────────────────────────────────────────────────────
const W = window.innerWidth, H = window.innerHeight - 48;
const svg = d3.select('#graph').attr('width', W).attr('height', H);
const zoomLayer = d3.select('#zoom-layer');

const nodeMap = new Map(DATA.nodes.map(n => [n.id, n]));
const PRIMARY_ENEMY_IDS = new Set((DATA.primaryEnemyIds || []).map(id => id.toUpperCase()));

// ── Стан взаємодії ────────────────────────────────────────────────────────
let hiddenStats   = new Set();
let hiddenTypes   = new Set();
let pathEdgeKeys  = new Set(); // ключі "A|B" та "B|A" для ребер активного шляху
let focusedId     = null;
let focusNeigh    = new Set();
let matchedIds    = new Set();
let visibleIds    = new Set();
let curK          = 1;

// ── Pre-computed layout (sfdp) ────────────────────────────────────────────
// sfdp дає координати у просторі 72×дюйми → для великих графів (~20K×14K одиниць).
// Нормалізуємо до TARGET×TARGET, зберігаючи пропорції,
// щоб fitAll() давав зрозумілий початковий масштаб.
const preLayout = DATA.stats.preLayout === true
    && DATA.nodes.length > 0
    && DATA.nodes[0].px != null;

const TARGET = 5000; // цільовий простір координат (умовні пікселі)

if (preLayout) {
    const xs = DATA.nodes.map(n => n.px), ys = DATA.nodes.map(n => n.py);
    const x0 = d3.min(xs), x1 = d3.max(xs);
    const y0 = d3.min(ys), y1 = d3.max(ys);
    const span = Math.max((x1 - x0) || 1, (y1 - y0) || 1);
    DATA.nodes.forEach(n => {
        n.x = (n.px - x0) / span * TARGET;
        n.y = (n.py - y0) / span * TARGET;
    });
    document.getElementById('layout-badge').textContent = '⚡ sfdp';
}

// ── Links ─────────────────────────────────────────────────────────────────
const linkSel = d3.select('#links')
    .selectAll('line')
    .data(DATA.links)
    .join('line')
    .attr('stroke',           d => EDGE_COLOR[d.relation] || '#aaa')
    .attr('stroke-width',     d => EDGE_W[d.relation] || 1)
    .attr('stroke-dasharray', d => EDGE_DASH[d.relation] || '')
    .attr('stroke-opacity', 0.5)
    .attr('marker-end', d => 'url(#arr-' + d.relation + ')');

// ── Вузли по шарах статусу ────────────────────────────────────────────────
// Кожен статус — окремий <g>. Порядок DOM визначає порядок малювання:
// UNKNOWN (знизу) → CLEAR → SUSPICIOUS → BLOCKED (зверху).
const STATUS_ORDER = ['UNKNOWN','CLEAR','SUSPICIOUS','BLOCKED'];

function buildNode(sel) {
    sel.each(function(n) {
        const g = d3.select(this);
        // Форма залежить від типу об'єкта
        if (n.type === 'ASN') {
            g.append('circle').attr('r', R);
        } else if (n.type === 'AS_SET') {
            const d = R * 1.3;
            g.append('polygon').attr('points', '0,' + (-d) + ' ' + d + ',0 0,' + d + ' ' + (-d) + ',0');
        } else if (n.type === 'MNTNER') {
            g.append('rect')
             .attr('x', -R).attr('y', -R)
             .attr('width', 2 * R).attr('height', 2 * R)
             .attr('rx', R * 0.3);
        } else { // ORGANISATION
            g.append('ellipse').attr('rx', R * 1.4).attr('ry', R * 0.9);
        }
        // Заливка та обводка за статусом
        g.select(':first-child')
         .attr('fill',         FILL[n.status]   || '#eee')
         .attr('stroke',       STROKE[n.status] || '#999')
         .attr('stroke-width', 1.5);
        // Підпис
        g.append('text')
         .attr('class', 'node-label')
         .attr('y', n.type === 'AS_SET' ? R * 1.5 : R * 1.2)
         .text(n.id.length > 18 ? n.id.slice(0, 16) + '…' : n.id);
    });
}

const nodeGroups = {};
STATUS_ORDER.forEach(st => {
    nodeGroups[st] = d3.select('#nodes-' + st)
        .selectAll('g.node')
        .data(DATA.nodes.filter(n => n.status === st))
        .join('g')
        .attr('class', 'node')
        .call(buildNode)
        .on('mouseover', onOver)
        .on('mouseout',  onOut)
        .on('click',     onClick);
});

// Кешована вибірка всіх підписів — оновлюється під час зуму (один раз за кадр)
const labelsSel = d3.selectAll('.node-label');

// ── Зум / пан ─────────────────────────────────────────────────────────────
// scaleExtent навмисно широкий ([0.005, 20]) — жодного кліпінгу навіть для
// графів з 18K вузлів у просторі 5000×5000 одиниць (fitAll дасть ~0.17).
const zoom = d3.zoom()
    .scaleExtent([0.005, 20])
    .filter(e => e.type !== 'mousedown' || !e.target.closest('.node'))
    .on('zoom', e => {
        curK = e.transform.k;
        zoomLayer.attr('transform', e.transform);
        // Підписи: підтримуємо ~9 px на екрані; ховаємо при k < 0.15
        if (curK < 0.15) {
            labelsSel.attr('display', 'none');
        } else {
            const fs = Math.round(9 / curK);
            labelsSel.attr('display', null).attr('font-size', fs);
        }
    });
svg.call(zoom);

// ── Симуляція (тільки без sfdp) ───────────────────────────────────────────
let fitDone = false;

const sim = d3.forceSimulation(preLayout ? [] : DATA.nodes)
    .force('link',    d3.forceLink(preLayout ? [] : DATA.links)
                        .id(d => d.id).distance(80).strength(0.5))
    .force('charge',  d3.forceManyBody().strength(-200))
    .force('center',  d3.forceCenter(W / 2, H / 2))
    .force('collide', d3.forceCollide(20));

if (preLayout) {
    sim.stop();
    updatePos();
    fitAll();
} else {
    let tick = 0;
    sim.on('tick', () => { updatePos(); if (++tick === 300) fitAll(); })
       .on('end',  () => { fitAll(); });
}

// ── Оновлення позицій ─────────────────────────────────────────────────────
function nodeR(n) { return (!n || n.type === 'ORGANISATION') ? R * 1.4 : R; }

function updatePos() {
    STATUS_ORDER.forEach(st =>
        nodeGroups[st].attr('transform', d => 'translate(' + (d.x || 0) + ',' + (d.y || 0) + ')')
    );
    // Кінці ребер зміщені до краю вузла (щоб стрілка не заходила всередину)
    linkSel
        .attr('x1', d => nodeMap.get(d.source.id || d.source)?.x || 0)
        .attr('y1', d => nodeMap.get(d.source.id || d.source)?.y || 0)
        .attr('x2', d => {
            const s = nodeMap.get(d.source.id || d.source);
            const t = nodeMap.get(d.target.id || d.target);
            if (!s || !t) return 0;
            const ang = Math.atan2(t.y - s.y, t.x - s.x);
            return t.x - nodeR(t) * Math.cos(ang);
        })
        .attr('y2', d => {
            const s = nodeMap.get(d.source.id || d.source);
            const t = nodeMap.get(d.target.id || d.target);
            if (!s || !t) return 0;
            const ang = Math.atan2(t.y - s.y, t.x - s.x);
            return t.y - nodeR(t) * Math.sin(ang);
        });
}

// ── Fit to screen ─────────────────────────────────────────────────────────
function fitAll() {
    if (fitDone) return;
    const ns = DATA.nodes.filter(n => n.x != null);
    if (!ns.length) return;
    const x0 = d3.min(ns, n => n.x) - 60, x1 = d3.max(ns, n => n.x) + 60;
    const y0 = d3.min(ns, n => n.y) - 60, y1 = d3.max(ns, n => n.y) + 60;
    const sc = Math.min(2, 0.85 / Math.max((x1 - x0) / W, (y1 - y0) / H));
    const t = d3.zoomIdentity
        .translate(W / 2 - sc * (x0 + x1) / 2, H / 2 - sc * (y0 + y1) / 2)
        .scale(sc);
    if (preLayout) {
        svg.call(zoom.transform, t); // одразу, без анімації
    } else {
        svg.transition().duration(800).call(zoom.transform, t);
    }
    fitDone = true;
}

function zoomToFit(ids) {
    const pts = DATA.nodes.filter(n => ids.has(n.id) && n.x != null);
    if (!pts.length) return;
    const x0 = d3.min(pts, n => n.x) - 60, x1 = d3.max(pts, n => n.x) + 60;
    const y0 = d3.min(pts, n => n.y) - 60, y1 = d3.max(pts, n => n.y) + 60;
    const sc = Math.min(3, 0.85 / Math.max((x1 - x0) / W, (y1 - y0) / H));
    svg.transition().duration(650).call(zoom.transform,
        d3.zoomIdentity
            .translate(W / 2 - sc * (x0 + x1) / 2, H / 2 - sc * (y0 + y1) / 2)
            .scale(sc));
}

// ── Hover ─────────────────────────────────────────────────────────────────
const tip = d3.select('#tooltip');

function onOver(event, n) {
    d3.select(this).select(':first-child').attr('stroke-width', 3);
    tip.style('display', 'block')
       .html('<b>' + esc(n.id) + '</b> <span style="color:#80CBC4">' + n.type + '</span>'
           + '<br><span class="status-' + n.status + '">' + n.status + '</span>'
           + (n.label && n.label !== n.id ? '<br>' + esc(n.label) : '')
           + (n.details ? '<hr style="border-color:#455A64;margin:4px 0">'
               + '<pre style="white-space:pre-wrap;font-size:10px">' + esc(n.details) + '</pre>' : ''))
       .style('left', (event.clientX + 14) + 'px')
       .style('top',  (event.clientY - 10) + 'px');
}

function onOut(event, n) {
    d3.select(this).select(':first-child')
      .attr('stroke-width', matchedIds.has(n.id) ? 3 : 1.5);
    tip.style('display', 'none');
}

// ── Click / Focus ─────────────────────────────────────────────────────────
function onClick(event, n) {
    event.stopPropagation();
    pathEdgeKeys = new Set();
    focusedId  = n.id;
    focusNeigh = new Set([n.id]);
    DATA.links.forEach(l => {
        const s = l.source.id || l.source, t = l.target.id || l.target;
        if (s === n.id) focusNeigh.add(t);
        if (t === n.id) focusNeigh.add(s);
    });
    applyVisibility();
    showInfo(n, focusNeigh.size - 1);
}

// Клік на порожньому місці — знімає фокус
svg.on('click', e => {
    if (!e.target.closest('.node')) {
        resetFocus();
        d3.select('#info-panel').style('display', 'none');
    }
});

// ── Drag ──────────────────────────────────────────────────────────────────
STATUS_ORDER.forEach(st => {
    nodeGroups[st].call(d3.drag()
        .on('start', (e, d) => {
            e.sourceEvent.stopPropagation(); // не запускати пан зуму
            if (!preLayout) sim.alphaTarget(0.3).restart();
            d.fx = d.x; d.fy = d.y;
        })
        .on('drag', (e, d) => {
            d.fx = e.x; d.fy = e.y;
            if (preLayout) updatePos();
        })
        .on('end', (e, d) => {
            if (!preLayout) { sim.alphaTarget(0); d.fx = null; d.fy = null; }
        }));
});

// ── Видимість (фільтр / фокус / пошук) ───────────────────────────────────
function applyVisibility() {
    const inFocus  = focusedId !== null;
    const inSearch = matchedIds.size > 0;

    STATUS_ORDER.forEach(st => {
        nodeGroups[st]
            .attr('display', d => (hiddenStats.has(d.status) || hiddenTypes.has(d.type)) ? 'none' : null)
            .attr('opacity', d => {
                if (hiddenStats.has(d.status) || hiddenTypes.has(d.type)) return null;
                if (inFocus  && !focusNeigh.has(d.id)) return 0.1;
                if (inSearch && !visibleIds.has(d.id))  return 0.1;
                return null;
            });
        // Виділення вузлів, знайдених пошуком
        nodeGroups[st].select(':first-child')
            .attr('stroke',       d => matchedIds.has(d.id) ? '#FF6F00' : (STROKE[d.status] || '#999'))
            .attr('stroke-width', d => matchedIds.has(d.id) ? 3 : 1.5)
            .style('filter',      d => matchedIds.has(d.id) ? 'drop-shadow(0 0 4px #FF6F00)' : null);
    });

    linkSel
        .attr('display', d => {
            const sn = nodeMap.get(d.source.id || d.source);
            const tn = nodeMap.get(d.target.id || d.target);
            if (!sn || !tn || hiddenStats.has(sn.status) || hiddenStats.has(tn.status)
                || hiddenTypes.has(sn.type) || hiddenTypes.has(tn.type)) return 'none';
            return null;
        })
        .attr('stroke-opacity', d => {
            const s = d.source.id || d.source, t = d.target.id || d.target;
            if (pathEdgeKeys.size > 0 && pathEdgeKeys.has(s + '|' + t)) return 1;
            if (inFocus && (s === focusedId || t === focusedId)) return 1;
            if (inFocus  && s !== focusedId && t !== focusedId) return 0.04;
            if (inSearch && !visibleIds.has(s) && !visibleIds.has(t)) return 0.04;
            return 0.5;
        })
        .attr('stroke', d => {
            const s = d.source.id || d.source, t = d.target.id || d.target;
            if (pathEdgeKeys.size > 0 && pathEdgeKeys.has(s + '|' + t)) return '#FFFFFF';
            if (inFocus && (s === focusedId || t === focusedId)) return '#FF1744';
            return EDGE_COLOR[d.relation] || '#aaa';
        })
        .attr('stroke-width', d => {
            const s = d.source.id || d.source, t = d.target.id || d.target;
            if (pathEdgeKeys.size > 0 && pathEdgeKeys.has(s + '|' + t)) return 3.5;
            if (inFocus && (s === focusedId || t === focusedId)) return 3.5;
            return EDGE_W[d.relation] || 1;
        })
        .attr('stroke-dasharray', d => {
            const s = d.source.id || d.source, t = d.target.id || d.target;
            return (pathEdgeKeys.size > 0 && pathEdgeKeys.has(s + '|' + t))
                ? '10,5' : (EDGE_DASH[d.relation] || '');
        })
        .style('animation', d => {
            const s = d.source.id || d.source, t = d.target.id || d.target;
            return (pathEdgeKeys.size > 0 && pathEdgeKeys.has(s + '|' + t))
                ? 'dash-flow 0.4s linear infinite' : null;
        });
    // Ребра фокусованого вузла — піднімаємо першими, path-ребра поверх них
    if (inFocus) {
        linkSel.filter(d => {
            const s = d.source.id || d.source, t = d.target.id || d.target;
            return s === focusedId || t === focusedId;
        }).raise();
    }
    if (pathEdgeKeys.size > 0) {
        linkSel.filter(d => {
            const s = d.source.id || d.source, t = d.target.id || d.target;
            return pathEdgeKeys.has(s + '|' + t);
        }).raise();
    }
}

function resetFocus() {
    pathEdgeKeys = new Set();
    focusedId = null; focusNeigh = new Set();
    matchedIds = new Set(); visibleIds = new Set();

}

document.getElementById('info-close').onclick = () => {

// ── Пошук ─────────────────────────────────────────────────────────────────
d3.select('#search').on('input', function() {
    const term = this.value.trim().toLowerCase();
    if (!term) { resetFocus(); return; }
    pathEdgeKeys = new Set();
    matchedIds = new Set();
    DATA.nodes.forEach(n => {
        if (n.id.toLowerCase().includes(term) ||
            (n.label   && n.label.toLowerCase().includes(term)) ||
            (n.details && n.details.toLowerCase().includes(term)))
            matchedIds.add(n.id);
    });
    visibleIds = new Set(matchedIds);
    DATA.links.forEach(l => {
        const s = l.source.id || l.source, t = l.target.id || l.target;
        if (matchedIds.has(s)) visibleIds.add(t);
        if (matchedIds.has(t)) visibleIds.add(s);
    });
    focusedId = null; focusNeigh = new Set();
    d3.select('#search-count').text(matchedIds.size + ' знайдено');
    applyVisibility();

// ── Утиліти ───────────────────────────────────────────────────────────────
function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── Зважений Dijkstra до ворожих ресурсів ────────────────────────────────
// Пріоритет ребра визначається типом вузла призначення:
// ASN(1) > AS_SET(2) > MNTNER(10) > ORGANISATION(100).
// Ненаправлений список суміжності будується один раз при першому виклику.
let _adjList = null;
function getAdjList() {
    if (_adjList) return _adjList;
    _adjList = new Map();
    DATA.nodes.forEach(n => _adjList.set(n.id, []));
    DATA.links.forEach(l => {
        const s = l.source.id || l.source, t = l.target.id || l.target;
        if (_adjList.has(s) && _adjList.has(t)) {
            _adjList.get(s).push(t);
            _adjList.get(t).push(s);
        }
    });
    return _adjList;
}

function _edgeW(nodeId) {
    const n = nodeMap.get(nodeId);
    if (!n) return 1;
    if (n.type === 'ORGANISATION') return 100;
    if (n.type === 'MNTNER')       return 10;
    if (n.type === 'AS_SET')       return 2;
    return 1; // ASN
}

// Мінімальна бінарна купа: зберігає пари [вартість, id].
class _MinHeap {
    constructor() { this._d = []; }
    push(it) { this._d.push(it); this._up(this._d.length - 1); }
    pop() {
        const top = this._d[0], last = this._d.pop();
        if (this._d.length > 0) { this._d[0] = last; this._dn(0); }
        return top;
    }
    get size() { return this._d.length; }
    _up(i) {
        const d = this._d;
        while (i > 0) { const p=(i-1)>>1; if (d[p][0]<=d[i][0]) break; [d[p],d[i]]=[d[i],d[p]]; i=p; }
    }
    _dn(i) {
        const d=this._d, n=d.length;
        for(;;){let m=i,l=2*i+1,r=l+1; if(l<n&&d[l][0]<d[m][0])m=l; if(r<n&&d[r][0]<d[m][0])m=r; if(m===i)break; [d[m],d[i]]=[d[i],d[m]]; i=m;}
    }
}

// Dijkstra від startId (ненаправлений, зважений за типом вузла призначення).
// Повертає Map targetId → { path: string[], cost: number } для кожного
// досяжного вузла PrimaryEnemyResources (один найкоротший зважений шлях).
function findPrimaryEnemyPaths(startId) {
    const adj = getAdjList();
    const dist = new Map([[startId, 0]]);
    const prev = new Map();
    const pq = new _MinHeap();
    pq.push([0, startId]);
    const found = new Map();
    while (pq.size > 0) {
        const [d, cur] = pq.pop();
        if (d > (dist.get(cur) ?? Infinity)) continue;
        if (cur !== startId && PRIMARY_ENEMY_IDS.has(cur)) {
            const path = [];
            let node = cur;
            while (node !== undefined) { path.unshift(node); node = prev.get(node); }
            found.set(cur, { path, cost: d });
        }
        for (const nb of (adj.get(cur) || [])) {
            const nd = d + _edgeW(nb);
            if (nd < (dist.get(nb) ?? Infinity)) {
                dist.set(nb, nd);
                prev.set(nb, cur);
                pq.push([nd, nb]);
            }
        }
    }
    return found;
}

function runEnemySearch(n) {
    const area = document.getElementById('enemy-search-area');
    if (!area) return;
    area.innerHTML = '<span style="font-size:10px;color:#78909C">&#1055;&#1086;&#1096;&#1091;&#1082;&#8230;</span>';
    setTimeout(() => {
        const paths = findPrimaryEnemyPaths(n.id);
        if (paths.size === 0) {
            area.innerHTML = '<div style="font-size:10px;color:#78909C;font-style:italic">&#1064;&#1083;&#1103;&#1093;&#1110;&#1074; &#1076;&#1086; &#1074;&#1086;&#1088;&#1086;&#1078;&#1080;&#1093; &#1088;&#1077;&#1089;&#1091;&#1088;&#1089;&#1110;&#1074; &#1085;&#1077; &#1079;&#1085;&#1072;&#1081;&#1076;&#1077;&#1085;&#1086;.</div>';
            return;
        }
        // AS-SET (містить '-') — за алфавітом першими; ASN (AS\d+) — за номером після
        const sorted = [...paths.entries()].sort(([tidA], [tidB]) => {
            const aIsAsn = /^AS\d+$/.test(tidA), bIsAsn = /^AS\d+$/.test(tidB);
            if (aIsAsn !== bIsAsn) return aIsAsn ? 1 : -1;
            if (aIsAsn) return parseInt(tidA.slice(2)) - parseInt(tidB.slice(2));
            return tidA.localeCompare(tidB);
        });
        let html = '<div style="font-size:10px;font-weight:600;color:#263238;margin-bottom:4px">&#1064;&#1083;&#1103;&#1093;&#1080; &#1076;&#1086; &#1087;&#1077;&#1088;&#1074;&#1080;&#1085;&#1085;&#1086;&#1075;&#1086; &#1074;&#1086;&#1088;&#1086;&#1078;&#1086;&#1075;&#1086; &#1088;&#1077;&#1089;&#1091;&#1088;&#1089;&#1091;:</div>';
        sorted.forEach(([tid, {path}]) => {
            const h = path.length - 1;
            html += '<div style="margin:2px 0"><a href="#" class="enemy-path-link" data-path="'
                + path.join(',') + '" style="font-size:10px;color:#0288D1;text-decoration:none">'
                + '&#8594; ' + esc(tid) + ' <span style="color:#90A4AE">(' + h + '&nbsp;&#1087;&#1077;&#1088;&#1077;&#1093;.' + ')</span></a></div>';
        });
        area.innerHTML = html;
        document.querySelectorAll('.enemy-path-link').forEach(a =>
            a.addEventListener('click', e => {
                e.preventDefault();
                const pathArr = e.currentTarget.dataset.path.split(',');
                highlightPath(new Set(pathArr), pathArr);
                showPathModal(pathArr);
            })
        );
    }, 0);
}

function highlightPath(pathIds, pathArr) {
    pathEdgeKeys = new Set();
    if (pathArr && pathArr.length > 1) {
        for (let i = 0; i < pathArr.length - 1; i++) {
            const a = pathArr[i], b = pathArr[i + 1];
            pathEdgeKeys.add(a + '|' + b);
            pathEdgeKeys.add(b + '|' + a);
        }
    }
    focusedId = null; focusNeigh = new Set();
    matchedIds = pathIds; visibleIds = pathIds;
    d3.select('#search').property('value', '');
    d3.select('#search-count').text(pathIds.size + ' на шляху');
    applyVisibility();
    zoomToFit(pathIds);
}

// Кольори статусів для тексту у вікні шляху
const STATUS_COLORS = {BLOCKED:'#C62828',SUSPICIOUS:'#E65100',CLEAR:'#2E7D32',UNKNOWN:'#01579B'};

// Відкриває плаваюче не-модальне вікно із деталями знайденого шляху.
// Можна відкрити одночасно декілька таких вікон — кожне незалежне.
function showPathModal(pathArr) {
    // Зміщення нового вікна відносно попередніх, щоб не повністю перекривалися
    const existing = document.querySelectorAll('.path-float-panel');
    const offset = existing.length * 24;

    const panel = document.createElement('div');
    panel.className = 'path-float-panel';
    panel.style.cssText = [
        'position:fixed',
        'top:' + (64 + offset) + 'px',
        'left:' + (Math.max(10, window.innerWidth - 480 - offset)) + 'px',
        'width:340px',
        'background:#fff',
        'border:1px solid #CFD8DC',
        'border-radius:8px',
        'box-shadow:0 4px 16px rgba(0,0,0,.25)',
        'font-size:11px',
        'z-index:50',
        'overflow:hidden',
        'resize:both',
    ].join(';');

    // Перший і останній елемент шляху для заголовку
    const fromId = pathArr[0];
    const toId   = pathArr[pathArr.length - 1];

    // Заголовок
    const header = document.createElement('div');
    header.style.cssText = 'background:#37474F;color:#fff;padding:7px 10px;display:flex;' +
        'justify-content:space-between;align-items:center;font-size:11px;font-weight:600;' +
        'cursor:move;user-select:none';
    header.innerHTML = 'Шлях: ' + esc(fromId) + ' → ' + esc(toId) +
        ' <span style="color:#90A4AE;font-size:10px;font-weight:400">(' + (pathArr.length - 1) + ' перех.)</span>';

    // Кнопка копіювання шляху в буфер обміну
    const copyBtn = document.createElement('button');
    copyBtn.textContent = '⎘';
    copyBtn.title = 'Копіювати шлях';
    copyBtn.style.cssText = 'background:none;border:none;color:#90A4AE;cursor:pointer;' +
        'font-size:14px;line-height:1;padding:0 4px;flex-shrink:0';
    copyBtn.addEventListener('click', () => {
        const text = pathArr.join(' → ');
        const doFallback = () => {
            const ta = document.createElement('textarea');
            ta.value = text; ta.style.position = 'fixed'; ta.style.opacity = '0';
            document.body.appendChild(ta); ta.select();
            document.execCommand('copy'); ta.remove();
        };
        (navigator.clipboard
            ? navigator.clipboard.writeText(text).catch(doFallback)
            : Promise.resolve(doFallback())
        ).then(() => {
            copyBtn.textContent = '✓';
            setTimeout(() => { copyBtn.textContent = '⎘'; }, 1500);
        });
    });
    header.appendChild(copyBtn);

    const closeBtn = document.createElement('button');
    closeBtn.textContent = '×';
    closeBtn.style.cssText = 'background:none;border:none;color:#90A4AE;cursor:pointer;' +
        'font-size:18px;line-height:1;padding:0 0 0 4px;flex-shrink:0';
    closeBtn.title = 'Закрити';
    closeBtn.addEventListener('click', () => panel.remove());
    header.appendChild(closeBtn);
    panel.appendChild(header);

    // Тіло з переліком вузлів шляху
    const body = document.createElement('div');
    body.style.cssText = 'padding:10px 12px;overflow-y:auto;max-height:380px';

    pathArr.forEach((id, idx) => {
        const n = nodeMap.get(id);
        const status  = n ? n.status : 'UNKNOWN';
        const type    = n ? n.type   : '?';
        const label   = n ? n.label  : '';
        const color   = STATUS_COLORS[status] || STATUS_COLORS.UNKNOWN;

        // Рядок вузла
        const row = document.createElement('div');
        row.style.cssText = 'display:flex;align-items:flex-start;gap:6px;margin:2px 0';

        // Порядковий номер
        const num = document.createElement('span');
        num.style.cssText = 'min-width:18px;color:#90A4AE;text-align:right;flex-shrink:0;padding-top:1px';
        num.textContent = (idx + 1) + '.';

        // Основна інформація
        const info = document.createElement('div');
        info.style.cssText = 'flex:1;min-width:0';

        const idSpan = document.createElement('span');
        idSpan.style.cssText = 'font-weight:700;color:' + color + ';word-break:break-all';
        idSpan.textContent = id;

        const typeBadge = document.createElement('span');
        typeBadge.style.cssText = 'display:inline-block;background:#ECEFF1;color:#546E7A;' +
            'border-radius:3px;font-size:9px;padding:0 4px;margin-left:5px;vertical-align:middle;white-space:nowrap';
        typeBadge.textContent = type;

        info.appendChild(idSpan);
        info.appendChild(typeBadge);

        if (label) {
            const lbl = document.createElement('div');
            lbl.style.cssText = 'color:#607D8B;font-size:10px;margin-top:1px;word-break:break-all';
            lbl.textContent = label;
            info.appendChild(lbl);
        }

        row.appendChild(num);
        row.appendChild(info);
        body.appendChild(row);

        // Стрілка між вузлами (не після останнього)
        if (idx < pathArr.length - 1) {
            const arrow = document.createElement('div');
            arrow.style.cssText = 'color:#90A4AE;font-size:10px;margin:0 0 0 24px;line-height:1.2';
            arrow.textContent = '↓';
            body.appendChild(arrow);
        }
    });

    panel.appendChild(body);
    document.body.appendChild(panel);

    // Drag — переміщення вікна мишею за заголовок
    let dragX = 0, dragY = 0;
    header.addEventListener('mousedown', e => {
        if (e.target === closeBtn) return;
        dragX = e.clientX - panel.offsetLeft;
        dragY = e.clientY - panel.offsetTop;
        const onMove = mv => {
            panel.style.left = (mv.clientX - dragX) + 'px';
            panel.style.top  = (mv.clientY - dragY) + 'px';
        };
        const onUp = () => {
            document.removeEventListener('mousemove', onMove);
            document.removeEventListener('mouseup', onUp);
        };
        document.addEventListener('mousemove', onMove);
        document.addEventListener('mouseup', onUp);
    });
}
