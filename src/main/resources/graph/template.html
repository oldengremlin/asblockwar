<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ASBlockWar · Dependency Graph</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#ECEFF1;overflow:hidden}

/* ── Header ── */
#header{position:fixed;top:0;left:0;right:0;height:48px;background:#263238;color:#fff;
        display:flex;align-items:center;gap:10px;padding:0 14px;z-index:20;box-shadow:0 2px 6px rgba(0,0,0,.4)}
#title{font-size:13px;font-weight:700;white-space:nowrap;letter-spacing:.4px}
#stats{font-size:10px;opacity:.65;white-space:nowrap;flex:1}
#layout-badge{font-size:10px;color:#80CBC4;white-space:nowrap;opacity:.9;flex-shrink:0}
#search{padding:4px 10px;border-radius:16px;border:none;font-size:12px;width:220px;outline:none;background:#37474F;color:#fff}
#search::placeholder{color:#90A4AE}
#search-count{font-size:10px;color:#80CBC4;white-space:nowrap;min-width:50px}
#btn-reset{background:none;border:1px solid #546E7A;color:#90A4AE;border-radius:12px;
           padding:2px 8px;font-size:11px;cursor:pointer;flex-shrink:0}
#btn-reset:hover{background:#37474F;color:#fff}

/* ── Graph canvas ── */
#graph{position:fixed;top:48px;left:0;display:block;cursor:default}

/* ── Tooltip ── */
#tooltip{position:fixed;background:rgba(30,40,45,.92);color:#ECEFF1;
         padding:8px 12px;border-radius:6px;font-size:11px;line-height:1.5;
         pointer-events:none;display:none;z-index:100;max-width:320px;
         box-shadow:0 3px 10px rgba(0,0,0,.5)}

/* ── Info panel ── */
#info-panel{position:fixed;top:56px;right:10px;width:240px;background:#fff;
            border:1px solid #CFD8DC;border-radius:8px;box-shadow:0 3px 10px rgba(0,0,0,.15);
            font-size:11px;display:none;overflow:hidden;z-index:15}
#info-header{background:#37474F;color:#fff;padding:7px 10px;display:flex;
             justify-content:space-between;align-items:center;font-size:12px;font-weight:600}
#info-close{background:none;border:none;color:#90A4AE;cursor:pointer;font-size:16px;line-height:1}
#info-body{padding:10px;overflow-y:auto;max-height:400px}
.info-id{font-size:13px;font-weight:700;color:#1A237E;word-break:break-all}
.info-meta{color:#607D8B;margin:2px 0 6px}
.info-label{color:#37474F;margin-bottom:4px}
.info-details{background:#ECEFF1;border-radius:4px;padding:6px 8px;font-size:10px;
              color:#455A64;white-space:pre-wrap;word-break:break-all;margin:4px 0}
.info-neighbors{color:#78909C;margin-top:6px;font-style:italic}
.status-BLOCKED{color:#C62828;font-weight:600}
.status-SUSPICIOUS{color:#E65100;font-weight:600}
.status-CLEAR{color:#2E7D32;font-weight:600}
.status-UNKNOWN{color:#01579B}

/* ── Legend ── */
#legend{position:fixed;bottom:10px;left:10px;background:rgba(255,255,255,.95);
        border:1px solid #CFD8DC;border-radius:8px;padding:8px 12px;font-size:10px;
        color:#455A64;line-height:1.8;z-index:15;box-shadow:0 2px 6px rgba(0,0,0,.1)}
#legend b{display:block;color:#263238;margin-bottom:2px;font-size:10px}
.leg-row{display:flex;align-items:center;gap:5px}
.leg-shape{display:inline-block;width:14px;text-align:center;font-size:11px}
.leg-color{display:inline-block;width:12px;height:12px;border-radius:2px;border:1.5px solid;flex-shrink:0}

/* ── Filters ── */
#filters{position:fixed;top:56px;left:10px;background:rgba(255,255,255,.95);
         border:1px solid #CFD8DC;border-radius:8px;padding:7px 10px;font-size:10px;
         color:#455A64;z-index:15;box-shadow:0 2px 6px rgba(0,0,0,.1)}
#filters b{display:block;color:#263238;margin-bottom:3px}
.filter-row{display:flex;align-items:center;gap:4px;margin:1px 0;cursor:pointer}
.filter-row input{cursor:pointer;accent-color:#546E7A}
</style>
</head>
<body>

<div id="header">
  <span id="title">ASBlockWar · Dependency Graph</span>
  <span id="stats"></span>
  <span id="layout-badge"></span>
  <input id="search" type="text" placeholder="Пошук: AS12345, MNTNER-NAME…" autocomplete="off">
  <span id="search-count"></span>
  <button id="btn-reset">✕ Reset</button>
</div>

<div id="filters">
  <b>Фільтр статусу</b>
  <label class="filter-row"><input type="checkbox" class="status-filter" data-status="BLOCKED" checked> <span style="color:#C62828">● Blocked</span></label>
  <label class="filter-row"><input type="checkbox" class="status-filter" data-status="SUSPICIOUS" checked> <span style="color:#E65100">● Suspicious</span></label>
  <label class="filter-row"><input type="checkbox" class="status-filter" data-status="CLEAR" checked> <span style="color:#2E7D32">● Clear</span></label>
  <label class="filter-row"><input type="checkbox" class="status-filter" data-status="UNKNOWN" checked> <span style="color:#01579B">● Unknown</span></label>
</div>

<canvas id="graph"></canvas>

<div id="tooltip"></div>

<div id="info-panel">
  <div id="info-header">
    <span id="info-title">Деталі</span>
    <button id="info-close">×</button>
  </div>
  <div id="info-body"></div>
</div>

<div id="legend">
  <b>Форма → Тип</b>
  <div class="leg-row"><span class="leg-shape">●</span> ASN (aut-num)</div>
  <div class="leg-row"><span class="leg-shape">◆</span> AS-SET</div>
  <div class="leg-row"><span class="leg-shape">■</span> MNTNER</div>
  <div class="leg-row"><span class="leg-shape">⬮</span> ORGANISATION</div>
  <b style="margin-top:6px">Колір → Статус</b>
  <div class="leg-row"><span class="leg-color" style="background:#FFCDD2;border-color:#C62828"></span> Blocked</div>
  <div class="leg-row"><span class="leg-color" style="background:#FFE0B2;border-color:#E65100"></span> Suspicious</div>
  <div class="leg-row"><span class="leg-color" style="background:#DCEDC8;border-color:#558B2F"></span> Clear</div>
  <div class="leg-row"><span class="leg-color" style="background:#E1F5FE;border-color:#01579B"></span> Unknown</div>
  <b style="margin-top:6px">Ребро → Зв'язок</b>
  <div class="leg-row"><svg width="28" height="10"><line x1="0" y1="5" x2="28" y2="5" stroke="#78909C" stroke-width="2"/></svg> mnt-by</div>
  <div class="leg-row"><svg width="28" height="10"><line x1="0" y1="5" x2="28" y2="5" stroke="#BA68C8" stroke-width="1.5" stroke-dasharray="5,2"/></svg> mnt-ref</div>
  <div class="leg-row"><svg width="28" height="10"><line x1="0" y1="5" x2="28" y2="5" stroke="#4DB6AC" stroke-width="2"/></svg> org</div>
  <div class="leg-row"><svg width="28" height="10"><line x1="0" y1="5" x2="28" y2="5" stroke="#81C784" stroke-width="1.5" stroke-dasharray="3,3"/></svg> member-of</div>
  <div class="leg-row"><svg width="28" height="10"><line x1="0" y1="5" x2="28" y2="5" stroke="#FFD54F" stroke-width="1.5" stroke-dasharray="8,3"/></svg> peer</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
<script>
// ── Data injected by GraphExporter ──────────────────────────────────────────
const DATA = [[GRAPH_DATA]];

// ── Palette ──────────────────────────────────────────────────────────────────
const FILL   = {BLOCKED:'#FFCDD2',SUSPICIOUS:'#FFE0B2',CLEAR:'#DCEDC8',UNKNOWN:'#E1F5FE'};
const STROKE = {BLOCKED:'#C62828',SUSPICIOUS:'#E65100',CLEAR:'#558B2F',UNKNOWN:'#01579B'};
const EDGE_COLOR={MNT_BY:'#78909C',MNT_REF:'#BA68C8',ORG:'#4DB6AC',MEMBER_OF:'#81C784',PEER:'#FFD54F'};
const EDGE_DASH ={MNT_BY:[],      MNT_REF:[5,2],     ORG:[],       MEMBER_OF:[3,3],   PEER:[8,3]};
const EDGE_W    ={MNT_BY:2,       MNT_REF:1.5,       ORG:2,        MEMBER_OF:1.5,     PEER:1.5};

// ── Canvas setup ──────────────────────────────────────────────────────────────
const W = window.innerWidth, H = window.innerHeight - 48;
const canvas = document.getElementById('graph');
canvas.width = W; canvas.height = H;
const ctx = canvas.getContext('2d');

// ── Node lookup ───────────────────────────────────────────────────────────────
const nodeMap = new Map(DATA.nodes.map(n => [n.id, n]));
function nodeById(id){ return nodeMap.get(id); }

// ── Interaction state ─────────────────────────────────────────────────────────
let transform   = d3.zoomIdentity;
let hiddenStats = new Set();
let focusedId   = null;
let focusNeigh  = new Set();
let matchedIds  = new Set();
let visibleIds  = new Set();
let hoveredNode = null;
let dragNode    = null;
let dragMoved   = false;

// ── Pre-computed layout ───────────────────────────────────────────────────────
const preLayout = DATA.stats.preLayout === true
    && DATA.nodes.length > 0
    && DATA.nodes[0].px != null;

if (preLayout) {
    DATA.nodes.forEach(n => { n.x = n.px; n.y = n.py; });
    document.getElementById('layout-badge').textContent = '⚡ sfdp';
}

// ── Zoom ──────────────────────────────────────────────────────────────────────
const zoom = d3.zoom().scaleExtent([0.04, 12])
    .filter(e => e.type === 'wheel' || !findNodeAt(e.offsetX, e.offsetY))
    .on('zoom', e => { transform = e.transform; draw(); });
d3.select(canvas).call(zoom);

// ── Simulation (skipped when sfdp layout is present) ─────────────────────────
let tickCount = 0, fitDone = false;

const sim = d3.forceSimulation(preLayout ? [] : DATA.nodes)
    .force('link',   d3.forceLink(preLayout ? [] : DATA.links).id(d => d.id).distance(90).strength(.5))
    .force('charge', d3.forceManyBody().strength(-220))
    .force('center', d3.forceCenter(W/2, H/2))
    .force('collide', d3.forceCollide(24));

if (preLayout) {
    sim.stop();
    buildQt(); draw(); fitAll();
} else {
    sim.on('tick', () => {
        if (++tickCount % 40 === 0) buildQt();
        if (tickCount === 300) fitAll();
        draw();
    }).on('end', () => { buildQt(); fitAll(); });
}

// ── Quadtree ──────────────────────────────────────────────────────────────────
let qt = null;
function buildQt() {
    qt = d3.quadtree().x(d => d.x).y(d => d.y)
        .addAll(DATA.nodes.filter(n => n.x != null && !hiddenStats.has(n.status)));
}

function findNodeAt(mx, my) {
    if (!qt) return null;
    const r = 20 / transform.k;
    return qt.find(transform.invertX(mx), transform.invertY(my), r) || null;
}

// ── Draw ──────────────────────────────────────────────────────────────────────
function draw() {
    ctx.clearRect(0, 0, W, H);
    ctx.save();
    ctx.translate(transform.x, transform.y);
    ctx.scale(transform.k, transform.k);

    const inFocus   = focusedId !== null;
    const inSearch  = matchedIds.size > 0;
    const showArrow = transform.k > 0.45;
    const showLabel = transform.k > 0.25;

    // ── Links ────────────────────────────────────────────────────────────────
    // Group by relation to minimize state changes
    const linkGroups = {};
    DATA.links.forEach(l => {
        const s = l.source.id || l.source, t = l.target.id || l.target;
        const sn = nodeById(s), tn = nodeById(t);
        if (!sn || !tn || sn.x == null || tn.x == null) return;
        if (hiddenStats.has(sn.status) || hiddenStats.has(tn.status)) return;
        const rel = l.relation || 'MNT_BY';
        if (!linkGroups[rel]) linkGroups[rel] = [];
        linkGroups[rel].push({l, sn, tn});
    });

    Object.entries(linkGroups).forEach(([rel, items]) => {
        ctx.strokeStyle = EDGE_COLOR[rel] || '#aaa';
        ctx.lineWidth   = EDGE_W[rel] || 1.5;

        // normal links pass
        ctx.setLineDash(EDGE_DASH[rel] || []);
        ctx.globalAlpha = 0.6;
        ctx.beginPath();
        items.forEach(({l, sn, tn}) => {
            const s = l.source.id||l.source, t = l.target.id||l.target;
            if ((inFocus  && s !== focusedId && t !== focusedId) ||
                (inSearch && !visibleIds.has(s) && !visibleIds.has(t))) return;
            ctx.moveTo(sn.x, sn.y); ctx.lineTo(tn.x, tn.y);
        });
        ctx.stroke();

        // dimmed links pass
        ctx.globalAlpha = 0.04;
        ctx.setLineDash([]);
        ctx.beginPath();
        items.forEach(({l, sn, tn}) => {
            const s = l.source.id||l.source, t = l.target.id||l.target;
            if (!((inFocus  && s !== focusedId && t !== focusedId) ||
                  (inSearch && !visibleIds.has(s) && !visibleIds.has(t)))) return;
            ctx.moveTo(sn.x, sn.y); ctx.lineTo(tn.x, tn.y);
        });
        ctx.stroke();

        // arrowheads (only visible, only when zoomed in enough)
        if (showArrow) {
            ctx.globalAlpha = 0.6;
            ctx.setLineDash([]);
            ctx.lineWidth = (EDGE_W[rel] || 1.5) * 0.8;
            ctx.beginPath();
            items.forEach(({l, sn, tn}) => {
                const s = l.source.id||l.source, t = l.target.id||l.target;
                if ((inFocus  && s !== focusedId && t !== focusedId) ||
                    (inSearch && !visibleIds.has(s) && !visibleIds.has(t))) return;
                const ang = Math.atan2(tn.y - sn.y, tn.x - sn.x);
                const r   = nodeApproxRadius(tn);
                const ex  = tn.x - r * Math.cos(ang);
                const ey  = tn.y - r * Math.sin(ang);
                const as  = 7;
                ctx.moveTo(ex, ey);
                ctx.lineTo(ex - as*Math.cos(ang-Math.PI/6), ey - as*Math.sin(ang-Math.PI/6));
                ctx.moveTo(ex, ey);
                ctx.lineTo(ex - as*Math.cos(ang+Math.PI/6), ey - as*Math.sin(ang+Math.PI/6));
            });
            ctx.stroke();
        }
    });

    ctx.setLineDash([]); ctx.globalAlpha = 1;

    // ── Nodes ────────────────────────────────────────────────────────────────
    DATA.nodes.forEach(n => {
        if (n.x == null || hiddenStats.has(n.status)) return;

        const dimmed = (inFocus  && !focusNeigh.has(n.id)) ||
                       (inSearch && !visibleIds.has(n.id));
        const hi     = matchedIds.has(n.id);
        const hov    = hoveredNode === n;

        ctx.globalAlpha = dimmed ? 0.1 : 1;
        ctx.beginPath(); nodeShape(n);
        ctx.fillStyle = FILL[n.status] || '#eee';
        ctx.fill();

        if (hi) { ctx.shadowColor='#FF6F00'; ctx.shadowBlur=8; }
        ctx.strokeStyle = hi ? '#FF6F00' : (STROKE[n.status] || '#999');
        ctx.lineWidth   = (hi || hov) ? 3.5 : 2;
        ctx.stroke();
        ctx.shadowBlur = 0;

        if (showLabel && !dimmed) {
            ctx.globalAlpha = 1;
            ctx.fillStyle   = '#37474F';
            ctx.font        = '8px system-ui,sans-serif';
            ctx.textAlign   = 'center';
            ctx.textBaseline= 'top';
            ctx.fillText(n.id.length > 18 ? n.id.slice(0,16)+'…' : n.id,
                         n.x, n.y + labelDy(n));
        }
        ctx.globalAlpha = 1;
    });

    ctx.restore();
}

function nodeShape(n) {
    if      (n.type==='ASN')          ctx.arc(n.x, n.y, 10, 0, Math.PI*2);
    else if (n.type==='AS_SET')       { ctx.moveTo(n.x,n.y-13); ctx.lineTo(n.x+13,n.y); ctx.lineTo(n.x,n.y+13); ctx.lineTo(n.x-13,n.y); ctx.closePath(); }
    else if (n.type==='MNTNER')       rrect(n.x-10, n.y-10, 20, 20, 3);
    else /* ORGANISATION */           ctx.ellipse(n.x, n.y, 14, 9, 0, 0, Math.PI*2);
}
function nodeApproxRadius(n){ return !n ? 12 : n.type==='ORGANISATION' ? 14 : 12; }
function labelDy(n){ return n.type==='AS_SET' ? 15 : 12; }
function rrect(x,y,w,h,r){
    ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.quadraticCurveTo(x+w,y,x+w,y+r);
    ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
    ctx.lineTo(x+r,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-r);
    ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y); ctx.closePath();
}

// ── Zoom-to-fit ───────────────────────────────────────────────────────────────
function fitAll() {
    if (fitDone) return;
    const ns = DATA.nodes.filter(n => n.x != null);
    if (!ns.length) return;
    const x0=d3.min(ns,n=>n.x)-60, x1=d3.max(ns,n=>n.x)+60;
    const y0=d3.min(ns,n=>n.y)-60, y1=d3.max(ns,n=>n.y)+60;
    const sc=Math.min(2, .85/Math.max((x1-x0)/W, (y1-y0)/H));
    d3.select(canvas).transition().duration(preLayout?400:800)
        .call(zoom.transform, d3.zoomIdentity
            .translate(W/2-sc*(x0+x1)/2, H/2-sc*(y0+y1)/2).scale(sc));
    fitDone = true;
}

function zoomToFit(ids) {
    const pts=DATA.nodes.filter(n=>ids.has(n.id)&&n.x!=null);
    if (!pts.length) return;
    const x0=d3.min(pts,n=>n.x)-60, x1=d3.max(pts,n=>n.x)+60;
    const y0=d3.min(pts,n=>n.y)-60, y1=d3.max(pts,n=>n.y)+60;
    const sc=Math.min(3, .85/Math.max((x1-x0)/W, (y1-y0)/H));
    d3.select(canvas).transition().duration(650)
        .call(zoom.transform, d3.zoomIdentity
            .translate(W/2-sc*(x0+x1)/2, H/2-sc*(y0+y1)/2).scale(sc));
}

// ── Hover ─────────────────────────────────────────────────────────────────────
const tip = d3.select('#tooltip');

document.addEventListener('mousemove', e => {
    const rect = canvas.getBoundingClientRect();
    const mx = e.clientX - rect.left;
    const my = e.clientY - rect.top;

    if (dragNode) {
        dragMoved = true;
        dragNode.x = dragNode.fx = transform.invertX(mx);
        dragNode.y = dragNode.fy = transform.invertY(my);
        if (preLayout) buildQt();
        draw();
        return;
    }

    const inCanvas = mx >= 0 && mx <= W && my >= 0 && my <= H;
    if (!inCanvas) {
        if (hoveredNode) { hoveredNode=null; tip.style('display','none'); canvas.style.cursor='default'; draw(); }
        return;
    }

    const n = findNodeAt(mx, my);
    if (n !== hoveredNode) { hoveredNode=n; draw(); }
    if (n) {
        canvas.style.cursor = 'pointer';
        tip.style('display','block')
           .html('<b>'+esc(n.id)+'</b> <span style="color:#80CBC4">'+n.type+'</span>'
               +'<br><span class="status-'+n.status+'">'+n.status+'</span>'
               +(n.label&&n.label!==n.id?'<br>'+esc(n.label):'')
               +(n.details?'<hr style="border-color:#455A64;margin:4px 0"><pre style="white-space:pre-wrap;font-size:10px">'+esc(n.details)+'</pre>':''))
           .style('left',(e.clientX+14)+'px').style('top',(e.clientY-10)+'px');
    } else {
        canvas.style.cursor = 'default';
        tip.style('display','none');
    }
});

canvas.addEventListener('mouseleave', () => {
    if (!dragNode) { hoveredNode=null; tip.style('display','none'); draw(); }
});

// ── Click ─────────────────────────────────────────────────────────────────────
canvas.addEventListener('click', e => {
    if (dragMoved) return;
    const n = findNodeAt(e.offsetX, e.offsetY);
    if (n) {
        focusedId  = n.id;
        focusNeigh = new Set([n.id]);
        DATA.links.forEach(l => {
            const s=l.source.id||l.source, t=l.target.id||l.target;
            if (s===n.id) focusNeigh.add(t);
            if (t===n.id) focusNeigh.add(s);
        });
        showInfo(n, focusNeigh.size - 1);
        draw();
    } else {
        resetFocus();
        d3.select('#info-panel').style('display','none');
    }
});

// ── Drag ──────────────────────────────────────────────────────────────────────
// Capture phase so we intercept before d3.zoom's bubble-phase listener
canvas.addEventListener('mousedown', e => {
    if (e.button !== 0) return;
    const n = findNodeAt(e.offsetX, e.offsetY);
    if (!n) return;
    dragNode=n; dragMoved=false;
    n.fx=n.x; n.fy=n.y;
    if (!preLayout) sim.alphaTarget(0.3).restart();
    e.stopPropagation(); // prevent zoom from starting a pan
}, {capture: true});

document.addEventListener('mouseup', () => {
    if (!dragNode) return;
    if (!preLayout) { dragNode.fx=null; dragNode.fy=null; sim.alphaTarget(0); }
    if (preLayout) buildQt();
    dragNode=null;
});

// ── Info panel ────────────────────────────────────────────────────────────────
function showInfo(n, connCount) {
    d3.select('#info-title').text(n.id.length>22?n.id.slice(0,20)+'…':n.id);
    d3.select('#info-body').html(
        '<div class="info-id">'+esc(n.id)+'</div>'
       +'<div class="info-meta">'+n.type+' &middot; <span class="status-'+n.status+'">'+n.status+'</span></div>'
       +(n.label&&n.label!==n.id?'<div class="info-label">'+esc(n.label)+'</div>':'')
       +(n.details?'<pre class="info-details">'+esc(n.details)+'</pre>':'')
       +'<div class="info-neighbors">Прямих зв\'язків: '+connCount+'</div>');
    d3.select('#info-panel').style('display','block');
}
document.getElementById('info-close').onclick = () => {
    d3.select('#info-panel').style('display','none'); resetFocus();
};

// ── Search ────────────────────────────────────────────────────────────────────
d3.select('#search').on('input', function() {
    const term = this.value.trim().toLowerCase();
    if (!term) { resetFocus(); return; }
    matchedIds = new Set();
    DATA.nodes.forEach(n => {
        if (n.id.toLowerCase().includes(term)||(n.label&&n.label.toLowerCase().includes(term)))
            matchedIds.add(n.id);
    });
    visibleIds = new Set(matchedIds);
    DATA.links.forEach(l => {
        const s=l.source.id||l.source, t=l.target.id||l.target;
        if (matchedIds.has(s)) visibleIds.add(t);
        if (matchedIds.has(t)) visibleIds.add(s);
    });
    focusedId=null; focusNeigh=new Set();
    d3.select('#search-count').text(matchedIds.size+' found');
    draw();
    if (matchedIds.size > 0) zoomToFit(matchedIds);
});

function resetFocus() {
    focusedId=null; focusNeigh=new Set();
    matchedIds=new Set(); visibleIds=new Set();
    d3.select('#search').property('value','');
    d3.select('#search-count').text('');
    draw();
}

// ── Status filters ────────────────────────────────────────────────────────────
document.querySelectorAll('.status-filter').forEach(cb => {
    cb.addEventListener('change', () => {
        hiddenStats=new Set();
        document.querySelectorAll('.status-filter').forEach(c => {
            if (!c.checked) hiddenStats.add(c.dataset.status);
        });
        buildQt(); draw();
    });
});

// ── Reset button ──────────────────────────────────────────────────────────────
document.getElementById('btn-reset').onclick = () => {
    resetFocus();
    d3.select('#info-panel').style('display','none');
    document.querySelectorAll('.status-filter').forEach(c => c.checked=true);
    hiddenStats=new Set(); buildQt();
    fitDone=false; fitAll();
};

// ── Stats bar ─────────────────────────────────────────────────────────────────
const st=DATA.stats;
document.getElementById('stats').textContent=
    'Blocked: '+st.blocked+' · Suspicious: '+st.suspicious+
    ' · Clear: '+st.clear+' · Unknown: '+st.unknown+
    ' · Nodes: '+st.total+' · Edges: '+st.edges;

// ── Utils ─────────────────────────────────────────────────────────────────────
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
</script>
</body>
</html>
